name: Release

# Builds the add-in in Release x64, generates the single installer with Inno Setup, and
# publishes it as a GitHub Release asset. Requires windows-latest: net48/COM, RegAsm, and
# Inno Setup are Windows-only tools.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run Core tests
        run: dotnet test tests/HardwareInserter.Core.Tests/HardwareInserter.Core.Tests.csproj -c Release

      - name: Build solution (Release x64)
        run: dotnet build HardwareInserter.slnx -c Release -p:Platform=x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\HardwareInserter.iss'
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HardwareInserterSetup
          path: installer\Output\HardwareInserterSetup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\Output\HardwareInserterSetup.exe
          generate_release_notes: true
